model:
  provider: local
  base_url: http://localhost:11434/v1
  api_key: ollama
  model_name: qwen3:8b
  temperature: 0.0

agent:
  max_iterations: 20
  tool_timeout_seconds: 30
  repeated_call_window: 3

tools:
  static:
    - filesystem
    - shell
    - python_exec

mcp:
  servers:
    - name: neo4j
      command: /usr/local/bin/neo4j-mcp
      args: []
      env:
        NEO4J_URI: "${NEO4J_URI}"
        NEO4J_USERNAME: "${NEO4J_USERNAME}"
        NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
    - name: tosca-kb
      command: /Users/g.starr/Downloads/NTwareChroma/mcp-server-venv/bin/python3
      args: ["/Users/g.starr/Downloads/NTwareChroma/mcp_server.py"]

sandbox:
  timeout_seconds: 15
  max_output_bytes: 65536
  allow_network: false

graph_pipeline:
  context_dir: context/
  default_sample_size: 50
  default_batch_size: 500
  default_model: qwen3:8b

tricentis:
  deployment: "${TAIS_LLM_DEPLOYMENT}"

cypher_tool:
  provider: local
  model: "${CYPHER_MODEL}"  # e.g. qwen2.5-coder:7b; falls back to model.model_name if unset
  timeout_seconds: 120

bedrock:
  region: "${AWS_REGION}"
  model_id: ""
